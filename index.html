<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interactive_artworks</title>
  </head>
  <body>
    <canvas id="bg"></canvas>
    <div id="video-container">
      <video
        src="src/assets/edit_13.mp4"
        playsinline
        preload="auto"
        class="background-video"></video>

      <!-- Back to jellyfish — top left -->
      <button id="back-btn" aria-label="Back to jellyfish">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
      </button>

      <!-- Controls bar — bottom -->
      <div id="video-controls">
        <button id="play-btn" aria-label="Play/Pause">
          <svg id="icon-play" viewBox="0 0 24 24">
            <polygon points="5,3 19,12 5,21" />
          </svg>
          <svg id="icon-pause" viewBox="0 0 24 24" style="display: none">
            <rect x="5" y="3" width="4" height="18" />
            <rect x="15" y="3" width="4" height="18" />
          </svg>
        </button>
        <span id="time-current">0:00</span>
        <input
          id="scrubber"
          type="range"
          min="0"
          max="100"
          value="0"
          step="0.1" />
        <span id="time-total">0:00</span>
        <button id="fullscreen-btn" aria-label="Toggle fullscreen">
          <svg
            id="icon-fullscreen"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round">
            <path
              d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
          </svg>
          <svg
            id="icon-exit-fullscreen"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            style="display: none">
            <path
              d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3" />
          </svg>
        </button>
      </div>
    </div>

    <div id="hint-text">빛을 따라가 보세요</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
